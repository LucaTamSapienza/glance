name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install md4c notcurses
      - name: Build
        run: make
      - name: Package
        run: tar -czf glance_${{ github.ref_name }}_darwin_arm64.tar.gz glance glance-render README.md LICENSE
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: glance_*.tar.gz
